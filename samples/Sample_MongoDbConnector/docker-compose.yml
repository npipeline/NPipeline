version: "3.8"

services:
  # MongoDB 8 single-node replica set
  # Change streams require a replica set configuration
  mongo:
    image: mongo:8
    container_name: mongo
    ports:
      - "27017:27017"
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "rs.status().ok" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-time initialization of the replica set and seed data
  mongo-init:
    image: mongo:8
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    command: >
      bash -c "
        mongosh --host mongo --eval \"
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] });
        \";
        sleep 5;
        mongosh --host mongo /docker-entrypoint-initdb.d/init-mongo.js
      "

volumes:
  mongo-data:

